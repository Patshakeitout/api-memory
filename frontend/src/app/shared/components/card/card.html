<button class="card">
  <figure>
    <img class="face">

    <figcaption></figcaption>
  </figure>

  <figure class="back" aria-hidden>
    <img class="face" [src]="image().imgSrc" [alt]="image().title">
    <figcaption>
      {{ image().title }}
      {{ image().artist }}
      {{ image().year }}
    </figcaption>
  </figure>
</button>
