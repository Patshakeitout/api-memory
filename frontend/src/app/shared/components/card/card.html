<button class="card">
  <figure aria-hidden>
    <img class="face" [src]="image().imgSrc" [alt]="image().title" />
    <figcaption>{{ image().title }}, {{ image().artist }}, {{ image().year }}</figcaption>
  </figure>

  <figure>
    <img class="back">
    <figcaption></figcaption>
  </figure>
</button>
