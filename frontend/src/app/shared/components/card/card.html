<button class="card" [class.flipped]="flipState()">
  <figure>
    <img class="face" [src]="image().imgSrc" [alt]="image().title" />
    <figcaption>{{ image().title }}, {{ image().artist }}, {{ image().year }}</figcaption>
  </figure>

  <div class="back" aria-hidden="true" (click)="flipCard();">?</div>
</button>
